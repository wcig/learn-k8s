# namespace
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-manager-example
---
# serviceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingress-manager-example-service-account
  namespace: ingress-manager-example
---
# clusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ingress-manager-example-cluster-role
rules:
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - list
      - watch
      - create
      - update
      - delete
---
# clusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ingress-manager-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ingress-manager-example-cluster-role
subjects:
  - kind: ServiceAccount
    name: ingress-manager-example-service-account
    namespace: ingress-manager-example
---
# deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-manager-example
  namespace: ingress-manager-example
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-manager-example
  template:
    metadata:
      labels:
        app: ingress-manager-example
    spec:
      serviceAccountName: ingress-manager-example-service-account
      containers:
        - image: ingress-manager-example:v1.0
          name: container-0
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 200Mi
      imagePullSecrets:
        - name: default-secret